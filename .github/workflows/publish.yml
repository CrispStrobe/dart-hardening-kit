# Automated publishing to pub.dev via GitHub Actions + OIDC.
# Configure the counterpart on pub.dev: Admin → Automated publishing →
#   Repository: CrispStrobe/covfuzz
#   Tag pattern: v{{version}}
#   Require GitHub Actions environment: pub.dev
# Then release a version with:  git tag v0.2.0 && git push origin v0.2.0
name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'      # e.g. v0.2.0
  workflow_dispatch:                 # manual re-run from the Actions tab

jobs:
  publish:
    permissions:
      id-token: write                # required for OIDC auth to pub.dev
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@main
    with:
      environment: pub.dev           # must match the pub.dev + GitHub environment

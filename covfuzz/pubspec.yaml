name: covfuzz
description: >-
  Reader-robustness fuzzing for Dart parsers: blind and coverage-guided,
  with crash minimization and CLI tools.
version: 0.1.0
repository: https://github.com/CrispStrobe/dart-hardening-kit
topics:
  - fuzzing
  - testing
  - security
  - parser
executables:
  covfuzz_discover: discover
  covfuzz_probe: probe
  covfuzz_mutverify: mutverify
  covfuzz_scaffold: scaffold

environment:
  sdk: ^3.0.0
dependencies:
  vm_service: ">=14.0.0 <16.0.0"

dev_dependencies:
  lints: ^4.0.0
